services:
  quiet-shelf:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Lets the container reach an Ollama server on the host machine via
    # OLLAMA_HOST=http://host.docker.internal:11434 (works on Linux too).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

<!-- @dsCard group="Brand" viewport="700x220" name="Voice" subtitle="Direct, literary, no apology theater" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
</head>
<body>
<div style="padding: 18px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px;">
  <span style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint);">Placeholder</span>
  <span style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint);">Empty paste</span>
  <span style="font-family: var(--font-body); font-style: italic; font-size: 15px; color: var(--text-body);">"Paste your script. Every word of it."</span>
  <span style="font-family: var(--font-body); font-style: italic; font-size: 15px; color: var(--text-body);">"There's no script here yet. Paste it in and we'll get to work."</span>
  <span style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); margin-top: 8px;">Working</span>
  <span style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); margin-top: 8px;">Failure</span>
  <span style="font-family: var(--font-body); font-style: italic; font-size: 15px; color: var(--text-body);">"Reading your script… Breaking it into scenes…"</span>
  <span style="font-family: var(--font-body); font-style: italic; font-size: 15px; color: var(--text-body);">"The mapping engine didn't answer. Wait a moment and try again."</span>
</div>
</body>
</html>

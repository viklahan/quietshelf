<!-- @dsCard group="Colors" viewport="700x150" name="Paper — text" subtitle="Paper-cream text tones on ink" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
</head>
<body>
<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 16px;">
  <div style="border: 1px solid var(--edge-faint); border-radius: var(--radius-sm); height: 76px; padding: 10px; display: flex; flex-direction: column; justify-content: space-between;"><span style="color: var(--paper-200); font-size: 17px;">Emphasis</span><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-faint);">--paper-200</span></div>
  <div style="border: 1px solid var(--edge-faint); border-radius: var(--radius-sm); height: 76px; padding: 10px; display: flex; flex-direction: column; justify-content: space-between;"><span style="color: var(--paper-100); font-size: 17px;">Body text</span><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-faint);">--paper-100</span></div>
  <div style="border: 1px solid var(--edge-faint); border-radius: var(--radius-sm); height: 76px; padding: 10px; display: flex; flex-direction: column; justify-content: space-between;"><span style="color: var(--paper-400); font-size: 17px;">Muted</span><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-faint);">--paper-400</span></div>
  <div style="border: 1px solid var(--edge-faint); border-radius: var(--radius-sm); height: 76px; padding: 10px; display: flex; flex-direction: column; justify-content: space-between;"><span style="color: var(--paper-600); font-size: 17px;">Faint</span><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-faint);">--paper-600</span></div>
</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
</head>
<body>
<div style="padding: 18px 24px; display: flex; align-items: flex-end; gap: 14px;">

  <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;"><div style="width: 12px; height: 12px; background: var(--ember-500);"></div><span style="font-family: var(--font-mono); font-size: 10px; color: var(--text-faint);">3</span></div>
  <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;"><div style="width: 16px; height: 16px; background: var(--ember-500);"></div><span style="font-family: var(--font-mono); font-size: 10px; color: var(--text-faint);">4</span></div>
  <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;"><div style="width: 20px; height: 20px; background: var(--ember-500);"></div><span style="font-family: var(--font-mono); font-size: 10px; color: var(--text-faint);">5</span></div>

  <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;"><div style="width: 40px; height: 40px; background: var(--ember-500);"></div><span style="font-family: var(--font-mono); font-size: 10px; color: var(--text-faint);">10</span></div>

</div>

</html>

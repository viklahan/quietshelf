<!-- @dsCard group="Spacing" viewport="700x200" name="Radii & shadows" subtitle="Paper corners, ink-under-lamplight shadows" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
</head>
<body>
<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 20px 24px;">
  <div style="background: var(--surface-raised); border: var(--border-card); border-radius: var(--radius-xs); height: 90px; padding: 10px; display: flex; flex-direction: column; justify-content: flex-end;"><span style="font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);">--radius-xs 2px</span><span style="font-family: var(--font-mono); font-size: 10px; color: var(--text-faint);">stamps, chips</span></div>
  <div style="background: var(--surface-raised); border: var(--border-card); border-radius: var(--radius-sm); height: 90px; padding: 10px; display: flex; flex-direction: column; justify-content: flex-end;"><span style="font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);">--radius-sm 3px</span><span style="font-family: var(--font-mono); font-size: 10px; color: var(--text-faint);">buttons, inputs</span></div>
  <div style="background: var(--surface-card); border: var(--border-card); border-radius: var(--radius-md); box-shadow: var(--shadow-card); height: 90px; padding: 10px; display: flex; flex-direction: column; justify-content: flex-end;"><span style="font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);">--radius-md 5px</span><span style="font-family: var(--font-mono); font-size: 10px; color: var(--text-faint);">+ --shadow-card</span></div>
  <div style="background: var(--surface-card); border: var(--border-card); border-radius: var(--radius-md); box-shadow: var(--shadow-lifted); height: 90px; padding: 10px; display: flex; flex-direction: column; justify-content: flex-end;"><span style="font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);">--shadow-lifted</span><span style="font-family: var(--font-mono); font-size: 10px; color: var(--text-faint);">sticky bar, dialogs</span></div>
</div>
</body>
</html>

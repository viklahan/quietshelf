<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
</head>
<body>
<div style="padding: 16px 24px; display: flex; flex-direction: column; gap: 4px;">
  <div style="display: flex; align-items: baseline; gap: 16px;"><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); width: 110px; flex-shrink: 0;">--fs-display</span><span style="font-family: var(--font-display); font-size: 36px; font-weight: 500; color: var(--text-body);">Page title</span></div>
  <div style="display: flex; align-items: baseline; gap: 16px;"><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); width: 110px; flex-shrink: 0;">--fs-title 26px</span><span style="font-family: var(--font-display); font-size: 26px; font-weight: 500; color: var(--text-body);">Section title</span></div>
  <div style="display: flex; align-items: baseline; gap: 16px;"><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); width: 110px; flex-shrink: 0;">--fs-script 19px</span><span style="font-family: var(--font-body); font-size: 19px; color: var(--text-body);">Manuscript text</span></div>
  <div style="display: flex; align-items: baseline; gap: 16px;"><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); width: 110px; flex-shrink: 0;">--fs-body 16px</span><span style="font-family: var(--font-body); font-size: 16px; color: var(--text-body);">UI body copy</span></div>
  <div style="display: flex; align-items: baseline; gap: 16px;"><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); width: 110px; flex-shrink: 0;">--fs-meta 12.5px</span><span style="font-family: var(--font-mono); font-size: 12.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted);">Mono metadata</span></div>
</div>
</body>
</html>

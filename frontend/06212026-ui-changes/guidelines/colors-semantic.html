<!-- @dsCard group="Colors" viewport="700x170" name="Semantic roles" subtitle="Aliases in use — surface, text, accent, danger" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
</head>
<body>
<div style="display: flex; gap: 12px; padding: 16px; align-items: stretch;">
  <div style="flex: 1; background: var(--surface-card); border: var(--border-card); border-radius: var(--radius-md); box-shadow: var(--shadow-card); padding: 14px; display: flex; flex-direction: column; gap: 6px;">
    <span style="color: var(--text-body); font-size: 15px;">--text-body on --surface-card</span>
    <span style="color: var(--text-muted); font-size: 13px;">--text-muted for secondary copy</span>
    <span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); letter-spacing: 0.06em;">--TEXT-FAINT · METADATA</span>
  </div>
  <div style="display: flex; flex-direction: column; gap: 8px; justify-content: center;">
    <span style="background: var(--accent); color: var(--on-accent); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; padding: 9px 14px; border-radius: var(--radius-sm);">--accent</span>
    <span style="border: 1px solid rgba(160, 68, 55, 0.5); color: var(--danger-text); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; padding: 9px 14px; border-radius: var(--radius-sm); background: var(--wash-oxblood);">--danger</span>
  </div>
</div>
</body>
</html>

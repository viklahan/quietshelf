<!-- @dsCard group="Colors" viewport="700x150" name="Ink — surfaces" subtitle="Warm ink darkness, never pure black" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
</head>
<body>
<div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 16px;">
  <div style="background: var(--ink-950); border: 1px solid var(--edge-soft); border-radius: var(--radius-sm); height: 76px; padding: 8px; display: flex; flex-direction: column; justify-content: flex-end;"><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);">--ink-950</span><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-faint);">#100d0a</span></div>
  <div style="background: var(--ink-900); border: 1px solid var(--edge-soft); border-radius: var(--radius-sm); height: 76px; padding: 8px; display: flex; flex-direction: column; justify-content: flex-end;"><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);">--ink-900</span><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-faint);">page</span></div>
  <div style="background: var(--ink-800); border: 1px solid var(--edge-soft); border-radius: var(--radius-sm); height: 76px; padding: 8px; display: flex; flex-direction: column; justify-content: flex-end;"><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);">--ink-800</span><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-faint);">card</span></div>
  <div style="background: var(--ink-700); border: 1px solid var(--edge-soft); border-radius: var(--radius-sm); height: 76px; padding: 8px; display: flex; flex-direction: column; justify-content: flex-end;"><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);">--ink-700</span><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-faint);">raised</span></div>
  <div style="background: var(--ink-600); border: 1px solid var(--edge-soft); border-radius: var(--radius-sm); height: 76px; padding: 8px; display: flex; flex-direction: column; justify-content: flex-end;"><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);">--ink-600</span><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-faint);">pressed</span></div>
</div>
</body>
</html>

<!-- @dsCard group="Colors" viewport="700x170" name="Accents — ember & oxblood" subtitle="The lamp and the fight. Used sparingly." -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
</head>
<body>
<div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; padding: 16px;">
  <div style="background: var(--ember-400); border-radius: var(--radius-sm); height: 56px;"></div>
  <div style="background: var(--ember-500); border-radius: var(--radius-sm); height: 56px;"></div>
  <div style="background: var(--ember-600); border-radius: var(--radius-sm); height: 56px;"></div>
  <div style="background: var(--oxblood-400); border-radius: var(--radius-sm); height: 56px;"></div>
  <div style="background: var(--oxblood-500); border-radius: var(--radius-sm); height: 56px;"></div>
  <div style="background: var(--oxblood-600); border-radius: var(--radius-sm); height: 56px; background-color: rgb(35, 67, 73)"></div>
  <span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);">--ember-400</span>
  <span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);">--ember-500</span>
  <span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);">--ember-600</span>
  <span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);">--oxblood-400</span>
  <span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);">--oxblood-500</span>
  <span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);">--oxblood-600</span>
</div>
</body>
</html>

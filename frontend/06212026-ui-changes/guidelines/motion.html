<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
</head>
<body>
<div style="padding: 18px 24px; display: flex; flex-direction: column; gap: 10px;">
  <div style="display: flex; gap: 24px; font-family: var(--font-mono); font-size: 12px; color: var(--text-muted);">
    <span><strong style="color: var(--text-body); font-weight: 600;">--dur-fast 140ms</strong> hover, press</span>
    <span><strong style="color: var(--text-body); font-weight: 600;">--dur-base 260ms</strong> done treatment</span>
    <span><strong style="color: var(--text-body); font-weight: 600;">--dur-slow 480ms</strong> card deal-in</span>
  </div>
  <div style="display: flex; gap: 24px; font-family: var(--font-mono); font-size: 12px; color: var(--text-faint);">
    <span>--ease-quiet · cubic-bezier(.25,.1,.25,1)</span>
    <span>--ease-settle · cubic-bezier(.16,1,.3,1)</span>
    <span>respects prefers-reduced-motion</span>
  </div>
</div>

</html>
